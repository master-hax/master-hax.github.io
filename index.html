<html>
  <head>
    <meta charset="UTF-8">
    <title>TrackBuddy</title>

    <script async src="https://webrtchacks.github.io/adapter/adapter-latest.js"></script>
    <script type="module">

//   _____                         _      ____                _       _
//  |_   _|  _ __    __ _    ___  | | __ | __ )   _   _    __| |   __| |  _   _

/**
 *
 *  @author Vivek Revankar (github.com/master-hax)
 *  
 */

'use strict';

const WEBRTC_HOSTNAME_REMOTE = "TrackBuddyServer.local";

const ICE_UFRAG_LOCAL = "V6j+"; 
// const ICE_UFRAG = "driver"; 
const ICE_PWD_LOCAL = "OEKutPgoHVk/99FfqPOf444w";
// const ICE_PWD = "oversteeroversteeroversteer";

const ICE_UFRAG_REMOTE = "fKVhbscsMWDGAnBg"; 
// const ICE_UFRAG = "driver"; 
const ICE_PWD_REMOTE = "xGjQkAvKIVkBeVTGWcvCQtnVAeapczwa";
// const ICE_PWD = "oversteeroversteeroversteer";

// const logInfo = thing => {this.console.log(thing); logElement.innerHTML += thing+'<br>'}
const logInfo = thing => {console.log(thing);}
const logError = thing => {logInfo(thing); statusDisplay.textContent = "error"}

const statusDisplay = document.querySelector('#server-status');
const connectionStateElement = document.querySelector('#connection-state');
const signallingStateElement = document.querySelector('#signalling-state')
const sdpOfferElement = document.querySelector('#sdp-offer-textarea');
const sdpAnswerElement = document.querySelector('#sdp-answer-textarea');
const regenerateButton = document.querySelector('#regenerate-button');
const connectButton = document.querySelector('#connect-button');
const logElement = document.querySelector('#logs');

let peerConnection;
let dataChannel;

window.onload = function() {

    if (!this.RTCPeerConnection) {
        logError("browser does not have webRTC support!")
        return;
    }
    if (!this.RTCPeerConnection.prototype.createDataChannel) {
        logError("browser does not have webRTC data channel support!")
        return;
    }
    if (!this.adapter) {
        logError("adapter didn't load. stuff might not work. maybe.")
    }
    logInfo("confirmed webRTC support");

    regenerateButton.onclick = function() {
        sdpOfferElement.textContent = "";
        sdpAnswerElement.textContent = "";
        startWebRTC();
    };

    connectButton.onclick = function () {
        // if (dataChannel.readyState == "open") {
        if (dataChannel.readyState === "open") {
            logInfo("sending message");
            dataChannel.send("HOWDY");
        } else {
            logInfo("data channel is not open");
        }
    }
}

// thanks https://github.com/pion/offline-browser-communication for the initial setup
function startWebRTC() {

    if (peerConnection !== undefined) {
        logInfo("closing existing peer connection");
        peerConnection.close();
    }

    logInfo("creating new peer connection");
    peerConnection = new RTCPeerConnection();
    peerConnection.onsignalingstatechange = event => {
        logInfo(`signaling state change: ${peerConnection.signalingState}`);
        signallingStateElement.textContent = peerConnection.signalingState;
    };
    peerConnection.onconnectionstatechange = event => {
        logInfo(`connection state change: ${peerConnection.connectionState}`);
        connectionStateElement.textContent = peerConnection.connectionState;
    };
    // peerConnection.onicecandidate = event => {
    //     if (event.candidate) {
    //         logInfo(`ice candidate: ${event.candidate.candidate}`)
    //     } else {
    //         logInfo("all ice candidates have been sent (?)")
    //     }
    // };
    peerConnection.ondatachannel = event => {
        logInfo("we got a data channel? (why? wtf)")
    };

    dataChannel = peerConnection.createDataChannel('telemetry');
    dataChannel.onclose = event => {
        logInfo("data channel opened");
    };
    dataChannel.onopen =  event => {
        logInfo("data channel closed");
    };
    dataChannel.onmessage = event => {
        logInfo(`got message on data channel: ${event.data}`);
    };

    peerConnection.onnegotiationneeded = event => {
        logInfo('negotiation needed');
        peerConnection.createOffer()
        .then(function(offer) {
            offer.sdp = offer.sdp.replace(/^a=ice-ufrag.*$/m, `a=ice-ufrag:${ICE_UFRAG_LOCAL}`)
            offer.sdp = offer.sdp.replace(/^a=ice-pwd.*$/m, `a=ice-pwd:${ICE_PWD_LOCAL}`)
            sdpOfferElement.textContent = offer.sdp;
            return peerConnection.setLocalDescription(offer);
        })
        .then(function() {
            sdpAnswerElement.textContent = predefinedRemoteAnswer;
            return peerConnection.setRemoteDescription(
                new RTCSessionDescription({type: "answer",  sdp: predefinedRemoteAnswer})
            );
        })
        .catch(logInfo);
    };
}

const predefinedRemoteAnswer = `v=0
o=- 521628857 1575883112 IN IP4 0.0.0.0
s=-
t=0 0
a=fingerprint:sha-256 53:59:1A:45:F2:A8:21:62:71:D5:6F:3E:A2:F6:6D:4F:EF:46:0F:44:92:A0:EA:F1:45:02:6F:EF:0F:FE:58:9C
a=group:BUNDLE 0
a=ice-lite
m=application 9 DTLS/SCTP 5000
c=IN IP4 0.0.0.0
a=setup:passive
a=mid:0
a=sendrecv
a=sctpmap:5000 webrtc-datachannel 1024
a=ice-ufrag:${ICE_UFRAG_REMOTE}
a=ice-pwd:${ICE_PWD_REMOTE}
a=candidate:foundation 1 udp 2130706431 ` + WEBRTC_HOSTNAME_REMOTE +
` 5000 typ host generation 0
a=candidate:foundation 1 udp 2130706431 ` + WEBRTC_HOSTNAME_REMOTE +
` 5001 typ host generation 0
a=candidate:foundation 1 udp 2130706431 ` + WEBRTC_HOSTNAME_REMOTE +
` 5002 typ host generation 0
a=candidate:foundation 1 udp 2130706431 ` + WEBRTC_HOSTNAME_REMOTE +
` 5003 typ host generation 0
a=candidate:foundation 1 udp 2130706431 ` + WEBRTC_HOSTNAME_REMOTE +
` 5004 typ host generation 0
a=candidate:foundation 1 udp 2130706431 ` + WEBRTC_HOSTNAME_REMOTE +
` 5005 typ host generation 0
a=end-of-candidates
`
// ASCII art generated from https://textkool.com

    </script>
    <style>
body {
  color: white;
  background-color: #292929;
  overflow: auto;
}

#sdp-form textarea{
  width: 600px;
  height: 350px;
}

#testsvg {
  width: 400px;
  height: 250px;
  stroke: 30px black;
  font-family: dseg;
}

#testsvg:hover #rpmBar {
  fill: red;
  width: 95%;
}

#rpmBar {
  transition: width 2s, background-color 3s;
}

@font-face {
  font-family: dseg;
  /* src: url(./node_modules/dseg/fonts/DSEG14-Classic/DSEG14Classic-Regular.ttf); */
}

#svgtext {
  font-family: dseg;
}

#logs {
  position: fixed;
  top: 0;
  right: 0;
}
    </style>
  </head>
  <body>
    <h1>TrackBuddyClient</h1>
    <h2><span id="server-status">disconnected</span></h2>
    <br>
    <h3>webRTC signalling state: <span id="signalling-state">nothing yet</span></h3>
    <br>
    <h3>webRTC connection state: <span id="connection-state">nothing yet</span></h3>
    <br>
    <form id="sdp-form">
      <label>local SDP offer:</label>
      <br>
      <textarea id="sdp-offer-textarea" readonly></textarea>
      <br>
      <input type="button" id="regenerate-button" value="generate"></input>
      <br><br>
      <label>remote SDP answer:</label>
      <br>
      <textarea id="sdp-answer-textarea"></textarea>
      <br>
      <input type="button" id="connect-button" value="connect"></input>
    </form>
    <br>
    <br>
    <svg id="testsvg" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
      <rect id="border" width="400" height="250" fill="black"></rect>
      <rect id="gaugeBackground" width="380" height="230" fill="#292929" transform="translate(10,10)"></rect>
      <rect id="rpmBar" fill="blue" width="0" height="230" transform="translate(10,10)"/>
      <path d="M 0 75 Q 325 75 325 250 L 0 250 Z" fill="black" stroke="none"/>
      <text id="svgtext" x="10" y="230" font-size="55" style="text-anchor: start; fill: white; stroke:none;">
        00000
      <tspan font-size="20">RPM</tspan>
      </text>
    </svg>

    <br>
    <h2 id="mph"></h2>
    <br>
    <h2 id="kph"></h2>
    <br>
    <div id="logs">logs:<br></div>
  </body>
</html>
